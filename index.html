<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Family Tree</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="living-bg"></div>
    <div class="page-shell">
      <header class="hero">
        <h1>Family Tree</h1>

      </header>

      <main class="layout">
        <section class="tree-panel">
          <form class="search-bar" id="member-search-form">
            <label class="sr-only" for="member-search-input">Search family member</label>
            <input
              id="member-search-input"
              name="member-search"
              type="search"
              placeholder="Search by name..."
              list="member-search-list"
              autocomplete="off"
            />
            <datalist id="member-search-list"></datalist>
            
            <input
              id="city-search-input"
              name="city-search"
              type="search"
              placeholder="Search by city..."
              list="city-search-list"
              autocomplete="off"
            />
            <datalist id="city-search-list"></datalist>
            <button type="submit">Find</button>
            <button type="button" id="back-to-tree" hidden>Back to Tree</button>
          </form>
          <p class="search-status" id="search-status">Type a name or city to jump to that branch.</p>
          <div id="tree-root" class="tree-root" aria-label="Family tree"></div>
        </section>
      </main>
    </div>

    <div class="modal-backdrop" id="member-modal" hidden>
      <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="member-modal-title">
        <button class="modal-close" id="member-modal-close" type="button" aria-label="Close member details">×</button>
        <div class="modal-content" id="details-panel" aria-live="polite">
          <div class="details-empty">
            <p>Select a family member to see their photo and details.</p>
          </div>
        </div>
      </div>
    </div>

    <script src="data/family-tree.from-html.js?v=20260428-1"></script>
    <script src="script.js?v=20260428-1"></script>
  </body>
</html>
